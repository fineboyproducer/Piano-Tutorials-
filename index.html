<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ivory & Keys — Learn Piano & Keyboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,500&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://js.paystack.co/v1/inline.js"></script>
<style>
  :root{
    --ink:#EAF3F7;
    --ink-2:#DFEEF4;
    --card:#FFFFFF;
    --card-hi:#F2F9FC;
    --ivory:#1E3542;
    --ivory-dim:#4C6672;
    --gold:#8FCBE0;
    --gold-hi:#6FB8D4;
    --wood:#B9DEEC;
    --line:rgba(30,53,66,0.12);
    --shadow-key: 0 6px 0 #c3dce6, 0 10px 18px rgba(30,53,66,0.12);
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html{scroll-behavior:smooth;}
  body{
    background:var(--ink);
    color:var(--ivory);
    font-family:'Inter', sans-serif;
    line-height:1.6;
    overflow-x:hidden;
  }
  h1,h2,h3,h4{
    font-family:'Fraunces', serif;
    font-weight:500;
    letter-spacing:-0.01em;
    color:var(--ivory);
  }
  .mono{font-family:'JetBrains Mono', monospace;}
  a{color:inherit;}
  .wrap{max-width:1120px; margin:0 auto; padding:0 20px;}
  ::selection{background:var(--gold); color:var(--ink);}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important;}
  }

  /* NAV */
  nav{
    position:fixed; top:0; left:0; right:0; z-index:100;
    background:rgba(234,243,247,0.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  nav .wrap{
    display:flex; align-items:center; justify-content:space-between;
    height:64px;
  }
  .brand{
    font-family:'Fraunces', serif;
    font-size:1.05rem;
    font-weight:600;
    display:flex;
    align-items:center;
    gap:8px;
    letter-spacing:0.01em;
  }
  .brand .amp{color:var(--gold); font-style:italic; font-weight:400; padding:0 2px;}
  .brand-text{display:flex; flex-direction:column; line-height:1;}
  .brand-name{white-space:nowrap;}
  .brand-academy{
    font-family:'JetBrains Mono', monospace;
    font-size:0.6rem;
    font-weight:500;
    letter-spacing:0.22em;
    text-transform:uppercase;
    color:var(--gold-hi);
    margin-top:3px;
  }
  .brand-mark{
    width:36px; height:36px;
    flex-shrink:0;
    display:block;
    border-radius:50%;
  }
  footer .brand-mark{width:34px; height:34px;}
  .nav-cta{
    background:var(--gold);
    color:#0F2733;
    padding:9px 16px;
    border-radius:2px;
    font-weight:600;
    font-size:0.82rem;
    text-decoration:none;
    white-space:nowrap;
    transition:background 0.2s ease, transform 0.15s ease;
  }
  .nav-cta:hover{background:var(--gold-hi); transform:translateY(-1px);}

  /* HERO */
  .hero{
    padding:112px 0 44px;
    position:relative;
  }
  .eyebrow{
    color:var(--gold);
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    margin-bottom:18px;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .eyebrow::before{
    content:'';
    width:20px; height:1px;
    background:var(--gold);
    display:inline-block;
    flex-shrink:0;
  }
  .hero h1{
    font-size:clamp(2.1rem, 8vw, 4.6rem);
    line-height:1.08;
    max-width:820px;
    margin-bottom:18px;
  }
  .hero h1 em{
    font-style:italic;
    color:var(--gold-hi);
    font-weight:400;
  }
  .hero p.lead{
    font-size:1rem;
    color:var(--ivory-dim);
    max-width:520px;
    margin-bottom:30px;
  }
  .hero-ctas{display:flex; gap:14px; flex-wrap:wrap; margin-bottom:44px;}
  .btn-primary{
    background:var(--gold);
    color:#0F2733;
    padding:15px 26px;
    border-radius:2px;
    font-weight:700;
    text-decoration:none;
    font-size:0.92rem;
    border:none;
    cursor:pointer;
    transition:background 0.2s ease, transform 0.15s ease;
  }
  .btn-primary:hover{background:var(--gold-hi); transform:translateY(-2px);}
  .btn-ghost{
    background:transparent;
    color:var(--ivory);
    padding:15px 24px;
    border-radius:2px;
    font-weight:600;
    text-decoration:none;
    font-size:0.92rem;
    border:1px solid var(--line);
    transition:border-color 0.2s ease, background 0.2s ease;
  }
  .btn-ghost:hover{border-color:var(--gold); background:rgba(143,203,224,0.12);}

  /* KEY STRIP (decorative, playable) */
  .key-glow-wrap{
    position:relative;
    padding-top:24px;
  }
  .light-beam{
    position:absolute;
    top:-60px;
    width:180px;
    height:260px;
    background:radial-gradient(ellipse at 50% 0%, rgba(143,203,224,0.55) 0%, rgba(143,203,224,0.18) 45%, rgba(143,203,224,0) 75%);
    filter:blur(6px);
    pointer-events:none;
    z-index:1;
    animation:beamFloat 7s ease-in-out infinite;
  }
  .beam-1{left:8%; animation-delay:0s;}
  .beam-2{left:42%; height:300px; width:220px; animation-delay:1.4s;}
  .beam-3{left:74%; animation-delay:0.7s;}
  @keyframes beamFloat{
    0%, 100%{opacity:0.7; transform:translateY(0);}
    50%{opacity:1; transform:translateY(8px);}
  }
  .keystrip{
    display:flex;
    height:90px;
    border-radius:4px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(30,53,66,0.18), 0 0 80px rgba(143,203,224,0.35);
    position:relative;
    z-index:2;
  }
  .wkey{
    flex:1;
    background:linear-gradient(180deg, #FFFFFF 0%, #EEF7FA 100%);
    border-right:1px solid rgba(30,53,66,0.1);
    position:relative;
    cursor:pointer;
    transition:transform 0.08s ease, background 0.08s ease;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding-bottom:14px;
  }
  .wkey:last-child{border-right:none;}
  .wkey:hover, .wkey:active{
    background:linear-gradient(180deg, #DCF0F7 0%, var(--gold) 100%);
    transform:translateY(4px);
  }
  .wkey span{
    font-family:'JetBrains Mono', monospace;
    font-size:0.7rem;
    color:var(--ivory);
    opacity:0.35;
    letter-spacing:0.05em;
  }
  .bkey{
    position:absolute;
    top:0;
    width:6.2%;
    height:62%;
    background:linear-gradient(180deg, #2C4655 0%, #16232C 100%);
    border-radius:0 0 3px 3px;
    z-index:2;
    cursor:pointer;
    transition:transform 0.08s ease;
    box-shadow:0 4px 8px rgba(30,53,66,0.35);
  }
  .bkey:hover, .bkey:active{transform:translateY(3px); background:linear-gradient(180deg, var(--gold-hi) 0%, #1E3542 100%);}

  /* SECTION SHARED */
  section{padding:56px 0;}
  .section-head{max-width:640px; margin-bottom:36px;}
  .section-head .eyebrow{margin-bottom:14px;}
  .section-head h2{font-size:clamp(1.6rem, 6vw, 2.8rem); margin-bottom:14px;}
  .section-head p{color:var(--ivory-dim); font-size:0.95rem;}

  /* WHY / FEATURES */
  .feature-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
  }
  .feature{
    background:var(--ink);
    padding:28px 24px;
  }
  .feature .fkey{
    width:30px; height:40px;
    background:#FFFFFF;
    border:1px solid var(--line);
    border-radius:0 0 3px 3px;
    margin-bottom:18px;
    position:relative;
  }
  .feature .fkey::after{
    content:'';
    position:absolute;
    right:-10px; top:0;
    width:14px; height:60%;
    background:var(--ivory);
    border-radius:0 0 2px 2px;
  }
  .feature h3{font-size:1.1rem; margin-bottom:10px; font-weight:500;}
  .feature p{color:var(--ivory-dim); font-size:0.92rem;}

  /* INSTRUCTOR */
  .instructor{background:var(--ink);}
  .instructor .wrap{
    display:grid;
    grid-template-columns:1fr;
    gap:36px;
    align-items:start;
  }
  .instructor-portrait{
    position:relative;
    border-radius:18px;
    overflow:hidden;
    box-shadow:0 20px 48px rgba(30,53,66,0.18), 0 4px 12px rgba(30,53,66,0.10);
    transition:transform 0.4s cubic-bezier(.2,.8,.2,1), box-shadow 0.4s ease;
    line-height:0;
    max-width:420px;
    margin:0 auto;
  }
  .instructor-portrait img{
    width:100%;
    height:auto;
    display:block;
    transform:scale(1);
    transition:transform 0.6s cubic-bezier(.2,.8,.2,1);
  }
  .instructor-video{
    position:relative;
    width:100%;
    aspect-ratio:9/16;
    background:#0F2733;
    cursor:pointer;
    border:0;
    padding:0;
    margin:0;
    display:block;
    overflow:hidden;
    -webkit-tap-highlight-color:transparent;
  }
  .instructor-video .video-thumb{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
    transition:transform 0.5s cubic-bezier(.2,.8,.2,1), filter 0.35s ease;
  }
  .instructor-video:hover .video-thumb,
  .instructor-video:focus-visible .video-thumb{
    transform:scale(1.04);
    filter:brightness(0.92);
  }
  .instructor-video .play-overlay{
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:rgba(15,39,51,0.18);
    transition:background 0.3s ease;
  }
  .instructor-video:hover .play-overlay,
  .instructor-video:focus-visible .play-overlay{background:rgba(15,39,51,0.3);}
  .instructor-video .play-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    width:64px;
    height:64px;
    border-radius:50%;
    background:rgba(255,255,255,0.95);
    box-shadow:0 8px 24px rgba(15,39,51,0.35);
    transition:transform 0.3s cubic-bezier(.2,.8,.2,1), background 0.3s ease;
  }
  .instructor-video:hover .play-btn,
  .instructor-video:focus-visible .play-btn{
    transform:scale(1.08);
    background:#fff;
  }
  .instructor-video .play-btn svg{
    margin-left:3px;
    filter:drop-shadow(0 2px 4px rgba(0,0,0,0.15));
  }
  .instructor-video:focus-visible{
    outline:3px solid var(--gold-hi);
    outline-offset:3px;
  }
  .instructor-video-frame{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
    border:0;
  }
  .instructor-portrait:hover{
    transform:translateY(-4px);
    box-shadow:0 28px 60px rgba(30,53,66,0.24), 0 6px 16px rgba(30,53,66,0.12);
  }
  .instructor-portrait:hover img{transform:scale(1.035);}
  .instructor-portrait::after{
    content:'';
    position:absolute; inset:0;
    border-radius:18px;
    box-shadow:inset 0 0 0 1px rgba(30,53,66,0.08);
    pointer-events:none;
  }
  .instructor-content .section-head{margin-bottom:20px;}
  .instructor-content .lede{
    font-size:1rem;
    color:var(--ivory);
    margin-bottom:16px;
    line-height:1.6;
  }
  .instructor-content p{
    color:var(--ivory-dim);
    font-size:0.95rem;
    line-height:1.7;
    margin-bottom:16px;
  }
  .instructor-content p:last-of-type{margin-bottom:28px;}
  .instructor-grid{
    display:grid;
    grid-template-columns:1fr;
    gap:1px;
    background:var(--line);
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
    margin-bottom:32px;
  }
  .instructor-card{
    background:var(--card);
    padding:22px 20px;
  }
  .instructor-card .icon{
    width:38px; height:38px;
    border-radius:8px;
    background:rgba(143,203,224,0.16);
    color:var(--gold-hi);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:14px;
    font-size:1.1rem;
  }
  .instructor-card h4{font-size:0.98rem; font-weight:600; margin-bottom:6px; color:var(--ivory);}
  .instructor-card p{font-size:0.86rem; color:var(--ivory-dim); margin-bottom:0; line-height:1.55;}
  .instructor-content .btn-primary{width:100%; text-align:center; display:inline-block;}

  /* Scroll fade-up animation */
  .fade-up{
    opacity:0;
    transform:translateY(24px);
    transition:opacity 0.7s ease, transform 0.7s cubic-bezier(.2,.8,.2,1);
  }
  .fade-up.in-view{opacity:1; transform:translateY(0);}
  .instructor-content.fade-up{transition-delay:0.12s;}

  /* PRICING */
  .pricing-controls{
    display:flex; flex-direction:column; gap:26px;
    margin-bottom:36px;
  }
  .control-group label{
    display:block;
    font-family:'JetBrains Mono', monospace;
    font-size:0.75rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:16px;
  }
  .key-select{
    display:flex;
    flex-wrap:wrap;
    gap:0;
    border-radius:3px;
    overflow:hidden;
    box-shadow:0 8px 24px rgba(0,0,0,0.35);
  }
  .key-opt{
    flex:1 1 100%;
    background:#FFFFFF;
    color:var(--ivory);
    border:none;
    border-bottom:1px solid rgba(30,53,66,0.08);
    padding:18px 16px;
    cursor:pointer;
    font-family:'Fraunces', serif;
    font-size:1rem;
    font-weight:500;
    position:relative;
    text-align:left;
    transition:all 0.15s ease;
  }
  .key-opt:last-child{border-bottom:none;}
  .key-opt .sub{
    display:block;
    font-family:'Inter', sans-serif;
    font-size:0.72rem;
    color:var(--ivory-dim);
    font-weight:400;
    margin-top:4px;
  }
  .key-opt:hover{background:#EAF6FA;}
  .key-opt.active{
    background:var(--gold);
    color:#0F2733;
    box-shadow:inset 4px 0 0 rgba(15,39,51,0.15);
  }
  .key-opt.active .sub{color:rgba(15,39,51,0.65);}

  .price-display{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:4px;
    padding:28px 24px;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    flex-direction:column;
    gap:24px;
  }
  .price-info .plan-name{
    font-family:'JetBrains Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:8px;
  }
  .price-info .amount{
    font-family:'Fraunces', serif;
    font-size:2.4rem;
    font-weight:600;
    color:var(--ivory);
    line-height:1;
  }
  .price-info .amount sup{font-size:1.15rem; opacity:0.6; font-weight:400;}
  .price-info .per{color:var(--ivory-dim); font-size:0.88rem; margin-top:8px;}
  .price-cta{display:flex; flex-direction:column; align-items:flex-start; gap:10px; width:100%;}
  .price-cta .save-note{font-size:0.82rem; color:var(--gold-hi);}
  .price-cta .btn-primary{width:100%; text-align:center;}

  /* FORM MODAL */
  .modal-overlay{
    position:fixed; inset:0;
    background:rgba(15,39,51,0.45);
    backdrop-filter:blur(4px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:0;
  }
  .modal-overlay.open{display:flex;}
  .modal{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:0;
    padding:28px 22px;
    max-width:440px;
    width:100%;
    height:100%;
    max-height:100vh;
    overflow-y:auto;
  }
  .modal h3{font-size:1.3rem; margin-bottom:6px;}
  .modal .modal-sub{color:var(--ivory-dim); font-size:0.9rem; margin-bottom:28px;}
  .field{margin-bottom:20px;}
  .field label{
    display:block;
    font-size:0.82rem;
    color:var(--ivory-dim);
    margin-bottom:8px;
    font-weight:500;
  }
  .field input, .field select{
    width:100%;
    background:var(--ink);
    border:1px solid var(--line);
    color:var(--ivory);
    padding:13px 14px;
    border-radius:3px;
    font-family:'Inter', sans-serif;
    font-size:0.95rem;
  }
  .field input:focus, .field select:focus{
    outline:none;
    border-color:var(--gold);
  }
  .modal-summary{
    background:var(--ink);
    border:1px solid var(--line);
    border-radius:3px;
    padding:18px 20px;
    margin-bottom:24px;
    font-size:0.9rem;
    color:var(--ivory-dim);
  }
  .modal-summary strong{color:var(--ivory);}
  .modal-close{
    position:absolute;
    top:20px; right:20px;
    background:none;
    border:none;
    color:var(--ivory-dim);
    font-size:1.4rem;
    cursor:pointer;
    line-height:1;
  }
  .modal-wrap{position:relative;}
  .btn-block{width:100%; text-align:center;}
  .location-toggle{display:flex; gap:10px;}
  .location-toggle button{
    flex:1;
    background:var(--ink);
    border:1px solid var(--line);
    color:var(--ivory-dim);
    padding:12px;
    border-radius:3px;
    cursor:pointer;
    font-size:0.88rem;
    transition:all 0.15s ease;
  }
  .location-toggle button.active{
    border-color:var(--gold);
    color:var(--gold-hi);
    background:rgba(143,203,224,0.15);
  }

  /* TESTIMONIAL-STYLE / TRUST */
  .trust-strip{
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    padding:24px 0;
  }
  .trust-strip .wrap{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    text-align:center;
  }
  .trust-item .num{
    font-family:'Fraunces', serif;
    font-size:1.6rem;
    color:var(--gold-hi);
    font-weight:600;
  }
  .trust-item .label{
    font-size:0.72rem;
    color:var(--ivory-dim);
    text-transform:uppercase;
    letter-spacing:0.05em;
    margin-top:4px;
  }

  /* HOW IT WORKS */
  .steps{display:flex; flex-direction:column; gap:0;}
  .step{
    display:flex;
    gap:18px;
    padding:24px 0;
    border-bottom:1px solid var(--line);
    align-items:flex-start;
  }
  .step:last-child{border-bottom:none;}
  .step .step-key{
    font-family:'Fraunces', serif;
    font-size:1rem;
    color:var(--ivory);
    background:#FFFFFF;
    border:1px solid var(--line);
    width:42px; height:56px;
    border-radius:0 0 4px 4px;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding-bottom:8px;
    flex-shrink:0;
    font-weight:600;
  }
  .step h4{font-size:1.02rem; margin-bottom:6px; font-weight:500;}
  .step p{color:var(--ivory-dim); font-size:0.9rem; max-width:520px;}

  /* FOOTER */
  footer{
    padding:36px 0 28px;
    border-top:1px solid var(--line);
  }
  footer .wrap{
    display:flex;
    flex-direction:column;
    align-items:flex-start;
    gap:14px;
  }
  footer .foot-note{color:var(--ivory-dim); font-size:0.82rem;}

  /* MOBILE: hide black keys and light beams on the narrowest screens where they'd be too cramped to read */
  @media (max-width:480px){
    .bkey{display:none;}
    .light-beam{display:none;}
    .hero-ctas{flex-direction:column;}
    .hero-ctas .btn-primary, .hero-ctas .btn-ghost{width:100%; text-align:center;}
  }

  /* TABLET AND UP */
  @media (min-width:600px){
    .wrap{padding:0 32px;}
    nav .wrap{height:72px;}
    .brand{font-size:1.2rem; gap:10px;}
    .brand-academy{font-size:0.66rem; letter-spacing:0.24em; margin-top:4px;}
    .brand-mark{width:42px; height:42px;}
    footer .brand-mark{width:38px; height:38px;}
    .nav-cta{padding:10px 22px; font-size:0.9rem;}

    .hero{padding:140px 0 56px;}
    .eyebrow{font-size:0.78rem; letter-spacing:0.14em; margin-bottom:22px;}
    .eyebrow::before{width:24px;}
    .hero h1{margin-bottom:24px;}
    .hero p.lead{font-size:1.1rem; margin-bottom:38px;}
    .hero-ctas{gap:16px; margin-bottom:56px;}
    .btn-primary, .btn-ghost{padding:16px 30px; font-size:0.98rem;}

    .key-glow-wrap{padding-top:36px;}
    .keystrip{height:130px;}

    section{padding:88px 0;}
    .section-head{margin-bottom:52px;}
    .section-head h2{margin-bottom:16px;}
    .section-head p{font-size:1rem;}

    .feature-grid{grid-template-columns:repeat(3, 1fr);}
    .feature{padding:36px 28px;}

    .instructor .wrap{grid-template-columns:1fr 1fr; gap:48px; align-items:center;}
    .instructor-grid{grid-template-columns:1fr 1fr;}
    .instructor-content .btn-primary{width:auto;}

    .pricing-controls{gap:32px; margin-bottom:48px;}
    .key-select{flex-wrap:nowrap;}
    .key-opt{flex:1; padding:24px 12px 18px; text-align:center; border-bottom:none; border-right:1px solid rgba(30,53,66,0.08);}
    .key-opt:last-child{border-right:none;}
    .key-opt.active{box-shadow:inset 0 -4px 0 rgba(15,39,51,0.15);}

    .price-display{flex-direction:row; align-items:center; padding:40px;}
    .price-info .amount{font-size:2.9rem;}
    .price-cta{align-items:flex-end; width:auto;}
    .price-cta .btn-primary{width:auto;}

    .modal-overlay{padding:20px;}
    .modal{border-radius:6px; padding:40px; height:auto; max-height:90vh;}
    .modal h3{font-size:1.5rem;}
